services:
  caddy:
    build:
      context: ./config/caddy
      additional_contexts:
        medical-manager-frontend-source: https://github.com/nordine-abde/medical-manager.git#main:frontend
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      REDIRECT_SCHEME: ${REDIRECT_SCHEME:-http}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ROUTER_CONFIG: ${ROUTER_CONFIG:?Set ROUTER_CONFIG in .env}
      PRINTER_CONFIG: ${PRINTER_CONFIG:?Set PRINTER_CONFIG in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CADDY_DATA_FOLDER}:/data
      - ${CADDY_CONFIG_FOLDER}:/config
    networks:
      - internal_server_net
  medical-manager-backend:
    build:
      context: https://github.com/nordine-abde/medical-manager.git#main:backend
    restart: unless-stopped
    depends_on:
      medical-manager-postgres:
        condition: service_healthy
    command: ["sh", "-c", "bun run db:migrate && bun run start"]
    environment:
      APP_NAME: medical-manager-backend
      API_PREFIX: /api/v1
      HOST: 0.0.0.0
      PORT: ${MEDICAL_MANAGER_API_PORT:-3000}
      BETTER_AUTH_URL: ${MEDICAL_MANAGER_BETTER_AUTH_URL:?Set MEDICAL_MANAGER_BETTER_AUTH_URL in .env}
      BETTER_AUTH_SECRET: ${MEDICAL_MANAGER_BETTER_AUTH_SECRET:?Set MEDICAL_MANAGER_BETTER_AUTH_SECRET in .env}
      DATABASE_URL: postgres://${MEDICAL_MANAGER_POSTGRES_USER:-medical_manager}:${MEDICAL_MANAGER_POSTGRES_PASSWORD:?Set MEDICAL_MANAGER_POSTGRES_PASSWORD in .env}@medical-manager-postgres:5432/${MEDICAL_MANAGER_POSTGRES_DB:-medical_manager}
      DATABASE_SCHEMA: ${MEDICAL_MANAGER_DATABASE_SCHEMA:-app}
      DATABASE_SSL: "false"
      DATABASE_MAX_CONNECTIONS: ${MEDICAL_MANAGER_DATABASE_MAX_CONNECTIONS:-10}
      DOCUMENTS_STORAGE_ROOT: /app/data/documents
      TELEGRAM_BOT_TOKEN: ${MEDICAL_MANAGER_TELEGRAM_BOT_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "${MEDICAL_MANAGER_API_PORT:-3000}"
    volumes:
      - ${MEDICAL_MANAGER_DOCUMENTS_FOLDER:-./data/medical-manager/documents}:/app/data/documents
    healthcheck:
      test: ["CMD", "bun", "-e", "const response = await fetch('http://127.0.0.1:3000/api/v1/health/'); process.exit(response.ok ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal_server_net
    user: "0:0"
  medical-manager-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MEDICAL_MANAGER_POSTGRES_DB:-medical_manager}
      POSTGRES_USER: ${MEDICAL_MANAGER_POSTGRES_USER:-medical_manager}
      POSTGRES_PASSWORD: ${MEDICAL_MANAGER_POSTGRES_PASSWORD:?Set MEDICAL_MANAGER_POSTGRES_PASSWORD in .env}
    volumes:
      - ${MEDICAL_MANAGER_POSTGRES_DATA_FOLDER:-./data/medical-manager/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEDICAL_MANAGER_POSTGRES_USER:-medical_manager} -d ${MEDICAL_MANAGER_POSTGRES_DB:-medical_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_server_net
  filebrowser:
    image: filebrowser/filebrowser
    container_name: filebrowser
    depends_on:
      filebrowser-bootstrap:
        condition: service_completed_successfully
    # Rootless Docker maps container root to the host user; the image default UID
    # cannot write host-user-owned bind mounts.
    user: "0:0"
    command: ["--root", "/srv", "--database", "/database/filebrowser.db"]
    volumes:
      - ${FILE_BROWSER_SRV_FOLDER}:/srv
      - ${FILE_BROWSER_DATABASE_FOLDER}:/database
      - ${FILE_BROWSER_CONFIG_FOLDER}:/config
    restart: unless-stopped
    networks:
      - internal_server_net
  filebrowser-bootstrap:
    image: filebrowser/filebrowser
    user: "0:0"
    network_mode: none
    entrypoint: ["/bin/sh", "/bootstrap/bootstrap_users_and_shares.sh"]
    environment:
      FILE_BROWSER_BOOTSTRAP_USERS: ${FILE_BROWSER_BOOTSTRAP_USERS:-}
      FILE_BROWSER_BOOTSTRAP_SHARED_FOLDERS: ${FILE_BROWSER_BOOTSTRAP_SHARED_FOLDERS:-/scans:Scans}
    volumes:
      - ${FILE_BROWSER_SRV_FOLDER}:/srv
      - ${FILE_BROWSER_DATABASE_FOLDER}:/database
      - ./config/filebrowser/bootstrap_users_and_shares.sh:/bootstrap/bootstrap_users_and_shares.sh:ro
    restart: "no"
  ftp-scans:
    image: stilliard/pure-ftpd:hardened
    container_name: ftp-scans
    restart: unless-stopped
    environment:
      PUBLICHOST: ${FTP_PUBLIC_HOST:-${DOMAIN}}
      FTP_USER_NAME: ${FTP_SCANS_USER:-scanner}
      FTP_USER_PASS: ${FTP_SCANS_PASSWORD:?Set FTP_SCANS_PASSWORD in .env}
      FTP_USER_HOME: /home/scanner
      FTP_PASSIVE_PORTS: 30000:30009
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    volumes:
      - ${FILE_BROWSER_SRV_FOLDER}/scans:/home/scanner
      - ${FTP_PASSWD_FOLDER:-./data/ftp/passwd}:/etc/pure-ftpd/passwd
    networks:
      - internal_server_net
  kanboard:
    image: docker.io/kanboard/kanboard:v1.2.48
    container_name: kanboard
    restart: unless-stopped
    volumes:
      - kanboard-data:/var/www/app/data
      - kanboard-plugins:/var/www/app/plugins
      - kanboard-config:/var/www/app/config
      - kanboard-ssl:/var/www/app/ssl
    networks:
      - internal_server_net

networks:
  internal_server_net:
    name: internal_server_net

volumes:
  kanboard-data:
  kanboard-plugins:
  kanboard-config:
  kanboard-ssl:
