services:
  caddy:
    build:
      context: ./config/caddy
    restart: unless-stopped
    env_file:
      - ./config/caddy/.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CADDY_DATA_FOLDER}:/data
      - ${CADDY_CONFIG_FOLDER}:/config
    networks:
      - internal_server_net
  filebrowser:
    image: filebrowser/filebrowser
    container_name: filebrowser
    environment:
      PUID: ${FILE_BROWSER_USER_ID}
      PGID: ${FILE_BROWSER_USER_GROUP}
    volumes:
      - ${FILE_BROWSER_SRV_FOLDER}:/srv
      - ${FILE_BROWSER_DATABASE_FOLDER}:/database
      - ${FILE_BROWSER_CONFIG_FOLDER}:/config
    restart: unless-stopped
    networks:
      - internal_server_net
  dns:
    image: strm/dnsmasq
    volumes:
      - ${DNSMASQ_CONFIG_FILE}:/etc/dnsmasq.conf:ro
    ports:
      - "53:53/udp"
    cap_add:
      - NET_ADMIN
    networks:
      - internal_server_net

networks:
  internal_server_net:
    name: internal_server_net
